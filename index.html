<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Kitap - Gider Takibi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .bg-custom-blue { background-color: #4A708B; }
        .bg-custom-green { background-color: #00A86B; }
        .text-custom-blue { color: #1E90FF; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex justify-center items-start pt-4">

    <div class="w-full max-w-md bg-white shadow-2xl rounded-3xl overflow-hidden border border-gray-200 flex flex-col my-4" style="min-height: 800px;">
        
        <div class="bg-custom-blue text-white px-4 py-3 flex justify-between items-center shadow-md">
            <button onclick="changeView('settings')" class="hover:opacity-80"><i class="fa-solid fa-bars text-lg"></i></button>
            <h1 id="page-title" class="text-lg font-semibold">Genel Bakış</h1>
            <button onclick="changeView('dashboard')" class="hover:opacity-80"><i class="fa-solid fa-house text-lg"></i></button>
        </div>

        <div id="main-content" class="flex-1 overflow-y-auto pb-20">
            </div>

    </div>

    <script>
        // TARAYICI HAFIZASINDAN VERİLERİ YÜKLE VEYA VARSA VARSAYILANLARI GETİR
        let state = JSON.parse(localStorage.getItem('hesapKitapData')) || {
            islemler: [
                { id: 1, tip: 'gider', kategori: 'Ev Kirası', tarih: '2026-06-01', tutar: 1200.00, aciklama: '' },
                { id: 2, tip: 'gider', kategori: 'Market Alışverişi', tarih: '2026-06-03', tutar: 408.80, aciklama: 'Çay, kahve vb.' },
                { id: 3, tip: 'gider', kategori: 'Elektrik Faturası', tarih: '2026-06-05', tutar: 186.50, aciklama: '' },
                { id: 4, tip: 'gelir', kategori: 'Maaş', tarih: '2026-06-01', tutar: 3500.00, aciklama: '' },
                { id: 5, tip: 'gelir', kategori: 'Satış Primi', tarih: '2026-06-10', tutar: 650.00, aciklama: '' },
                { id: 6, tip: 'alacak', kategori: 'Bonus', tarih: '2026-06-15', tutar: 1000.00, aciklama: 'Haziran satış bonusu' },
                { id: 7, tip: 'borc', kategori: 'Telefon Faturası', tarih: '2026-06-11', tutar: 56.80, aciklama: '' }
            ],
            seciliSekme: 'gider',
            currentView: 'dashboard'
        };

        function saveData() {
            localStorage.setItem('hesapKitapData', JSON.stringify(state));
        }

        // FİNANSAL HESAPLAMALAR
        function hesapla() {
            let gelir = state.islemler.filter(i => i.tip === 'gelir').reduce((a, b) => a + b.tutar, 0);
            let gider = state.islemler.filter(i => i.tip === 'gider').reduce((a, b) => a + b.tutar, 0);
            let alacak = state.islemler.filter(i => i.tip === 'alacak').reduce((a, b) => a + b.tutar, 0);
            let borc = state.islemler.filter(i => i.tip === 'borc').reduce((a, b) => a + b.tutar, 0);
            let net = gelir - gider;
            let kasa = net; // Ekran görüntüsündeki Kasa mantığı
            return { gelir, gider, alacak, borc, net, kasa };
        }

        // EKRAN DEĞİŞTİRME YÖNETİCİSİ
        function changeView(view, extraData = null) {
            state.currentView = view;
            const content = document.getElementById('main-content');
            const title = document.getElementById('page-title');
            const özet = hesapla();

            if (view === 'dashboard') {
                title.innerText = "Genel Bakış";
                content.innerHTML = `
                    <div class="bg-custom-green text-white px-4 py-3 flex items-center gap-2">
                        <i class="fa-solid fa-folder-open"></i>
                        <span class="font-semibold">Kasa: ₺${özet.kasa.toFixed(2)}</span>
                    </div>

                    <div class="bg-white p-4 shadow-sm border-b border-gray-200 text-center">
                        <button class="text-custom-blue font-medium mb-3"><i class="fa-solid fa-calendar-days mr-1"></i> Bu Ay (Haziran 2026)</button>
                        <div class="grid grid-cols-3 gap-2 text-sm text-gray-600 mb-2">
                            <div><div>Gelirler</div><div class="font-bold text-black">₺${özet.gelir.toFixed(2)}</div></div>
                            <div><div>Giderler</div><div class="font-bold text-black">₺${özet.gider.toFixed(2)}</div></div>
                            <div><div>Net</div><div class="font-bold text-custom-green">₺${özet.net.toFixed(2)}</div></div>
                        </div>
                        <div class="border-t pt-2 grid grid-cols-2 text-sm text-gray-600">
                            <div><div>Alacaklar</div><div class="font-bold text-black">₺${özet.alacak.toFixed(2)}</div></div>
                            <div><div>Borçlar</div><div class="font-bold text-black">₺${özet.borc.toFixed(2)}</div></div>
                        </div>
                    </div>

                    <div class="p-3">
                        <div class="flex bg-gray-200 p-1 rounded-lg text-sm">
                            <button onclick="setTab('gelir')" class="flex-1 py-1.5 rounded-md text-center ${state.seciliSekme === 'gelir' ? 'bg-white shadow font-semibold' : 'text-gray-600'}">Gelirler</button>
                            <button onclick="setTab('gider')" class="flex-1 py-1.5 rounded-md text-center ${state.seciliSekme === 'gider' ? 'bg-white shadow font-semibold' : 'text-gray-600'}">Giderler</button>
                            <button onclick="setTab('alacak')" class="flex-1 py-1.5 rounded-md text-center ${state.seciliSekme === 'alacak' ? 'bg-white shadow font-semibold' : 'text-gray-600'}">Alacaklar</button>
                            <button onclick="setTab('borc')" class="flex-1 py-1.5 rounded-md text-center ${state.seciliSekme === 'borc' ? 'bg-white shadow font-semibold' : 'text-gray-600'}">Borçlar</button>
                        </div>
                    </div>

                    <div class="divide-y divide-gray-200 bg-white">
                        ${renderList()}
                    </div>

                    <div class="fixed bottom-4 max-w-md w-full px-4 flex gap-0 left-1/2 transform -translate-x-1/2">
                        <button onclick="changeView('add', 'gelir')" class="flex-1 bg-custom-green text-white py-3 font-semibold text-center rounded-l-xl shadow-lg">Gelir/Alacak Ekle</button>
                        <button onclick="changeView('add', 'gider')" class="flex-1 bg-red-600 text-white py-3 font-semibold text-center rounded-r-xl shadow-lg">Gider/Borç Ekle</button>
                    </div>
                `;
            } else if (view === 'add') {
                let defaultTip = extraData;
                title.innerText = defaultTip === 'gelir' ? "Gelir Ekle" : "Gider Ekle";
                content.innerHTML = `
                    <div class="p-4">
                        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tip Seçiniz</label>
                                <select id="form-tip" class="w-full border p-2 rounded-lg bg-gray-50 text-sm">
                                    ${defaultTip === 'gelir' ? '<option value="gelir">Gelir</option><option value="alacak">Alacak</option>' : '<option value="gider">Gider</option><option value="borc">Borç</option>'}
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
                                <input type="text" id="form-kategori" placeholder="Örn: Market, Fatura, Maaş" class="w-full border p-2 rounded-lg text-sm" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tarih</label>
                                <input type="date" id="form-tarih" value="${new Date().toISOString().split('T')[0]}" class="w-full border p-2 rounded-lg text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Tutar (₺)</label>
                                <input type="number" step="0.01" id="form-tutar" placeholder="0,00" class="w-full border p-2 rounded-lg text-sm" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Açıklama</label>
                                <input type="text" id="form-aciklama" placeholder="İsteğe bağlı notlar" class="w-full border p-2 rounded-lg text-sm">
                            </div>
                            <button onclick="kaydetIslem()" class="w-full bg-custom-blue text-white py-2.5 rounded-lg font-semibold text-sm shadow mt-2">Kaydet</button>
                        </div>
                    </div>
                `;
            } else if (view === 'settings') {
                title.innerText = "Ayarlar";
                content.innerHTML = `
                    <div class="bg-white divide-y divide-gray-200 mt-4 border-y">
                        <div onclick="changeView('yillik')" class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50">
                            <span class="text-sm font-medium"><i class="fa-solid fa-chart-bar text-amber-500 mr-2"></i> Yıllık Gelir-Gider Raporu</span>
                            <i class="fa-solid fa-chevron-right text-gray-400 text-xs"></i>
                        </div>
                        <div onclick="alert('Kategoriler yakında eklenecek.')" class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50">
                            <span class="text-sm font-medium"><i class="fa-solid fa-layer-group text-blue-500 mr-2"></i> Kategoriler</span>
                            <i class="fa-solid fa-chevron-right text-gray-400 text-xs"></i>
                        </div>
                    </div>
                `;
            } else if (view === 'yillik') {
                title.innerText = "Yıllık Raporlar";
                content.innerHTML = `
                    <div class="p-4">
                        <h3 class="text-center font-bold text-custom-blue mb-4">2026 Gelir Gider Dökümü</h3>
                        <table class="w-full bg-white rounded-xl shadow-sm border text-sm overflow-hidden">
                            <thead class="bg-gray-50 text-gray-500 border-b">
                                <tr>
                                    <th class="p-2 text-left">Aylar</th>
                                    <th class="p-2 text-right">Gelirler</th>
                                    <th class="p-2 text-right">Giderler</th>
                                    <th class="p-2 text-right">Net</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                <tr>
                                    <td class="p-2 text-custom-blue font-medium">Haziran</td>
                                    <td class="p-2 text-right">₺${özet.gelir.toFixed(2)}</td>
                                    <td class="p-2 text-right">₺${özet.gider.toFixed(2)}</td>
                                    <td class="p-2 text-right text-custom-green font-bold">₺${özet.net.toFixed(2)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                `;
            }
        }

        // SEKMEYE GÖRE LİSTE OLUŞTURMA
        function renderList() {
            let filtrelenmiş = state.islemler.filter(i => i.tip === state.seciliSekme);
            if (filtrelenmiş.length === 0) return `<div class="p-8 text-center text-gray-400 text-sm">Kayıt bulunamadı.</div>`;
            
            return filtrelenmiş.map(islem => `
                <div class="p-3 flex justify-between items-center text-sm">
                    <div>
                        <div class="text-xs text-gray-400">${islem.tarih.split('-').reverse().join('.')}</div>
                        <div class="font-medium text-gray-800">${islem.kategori}</div>
                        ${islem.aciklama ? `<div class="text-xs text-gray-500 italic">Not: ${islem.aciklama}</div>` : ''}
                    </div>
                    <div class="text-right">
                        <div class="font-bold text-gray-900 mb-1">₺${islem.tutar.toFixed(2)}</div>
                        <div class="flex gap-2 justify-end text-xs">
                            <button onclick="silIslem(${islem.id})" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-circle-xmark text-base"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setTab(tab) {
            state.seciliSekme = tab;
            changeView('dashboard');
        }

        // YENİ İŞLEM KAYDETME
        function kaydetIslem() {
            let tip = document.getElementById('form-tip').value;
            let kategori = document.getElementById('form-kategori').value.trim();
            let tarih = document.getElementById('form-tarih').value;
            let tutar = parseFloat(document.getElementById('form-tutar').value);
            let aciklama = document.getElementById('form-aciklama').value.trim();

            if(!kategori || isNaN(tutar)) {
                alert("Lütfen kategori ve tutar alanlarını doldurun.");
                return;
            }

            state.islemler.push({ id: Date.now(), tip, kategori, tarih, tutar, aciklama });
            saveData();
            state.seciliSekme = (tip === 'gelir' || tip === 'alacak') ? 'gelir' : 'gider';
            changeView('dashboard');
        }

        // İŞLEM SİLME
        function silIslem(id) {
            if(confirm('Bu işlemi silmek istediğinize emin misiniz?')) {
                state.islemler = state.islemler.filter(i => i.id !== id);
                saveData();
                changeView('dashboard');
            }
        }

        // İlk açılışta ana ekranı yükle
        changeView('dashboard');
    </script>
</body>
</html>
